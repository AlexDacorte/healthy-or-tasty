<section class="search-page">
  <div class="search-bar">
    <app-custom-input placeholder="Search" icon="search"></app-custom-input>
  </div>

  <mat-chip-listbox>
    <mat-chip>Chip 1</mat-chip>
    <mat-chip>Chip 2</mat-chip>
    <mat-chip>Chip 3</mat-chip>
  </mat-chip-listbox>

  <div class="filter-by-section">
    <mat-chip-row class="filter-by-tag">
      @for (tag of uniqueTags(); track tag) {
        <mat-basic-chip>
          <a mat-button>{{ tag }}</a>
        </mat-basic-chip>
      }
    </mat-chip-row>
    <mat-chip-row class="filter-by-origin">
      @for (cuisine of uniqueCousines(); track cuisine) {
        <mat-basic-chip>
          <a mat-button>{{ cuisine }}</a>
        </mat-basic-chip>
      }
    </mat-chip-row>
  </div>
  <p>{{ cardModels.length }} built-in recipes</p>

  <mat-grid-list class="gallery-grid" cols="2" rowHeight="1:0.8">
    @for (cardModel of cardModels; track cardModel) {
      <mat-grid-tile colspan="1" rowspan="1">
        <app-gallery-card [cardModel]="cardModel"></app-gallery-card>
      </mat-grid-tile>
    }
  </mat-grid-list>
</section>
