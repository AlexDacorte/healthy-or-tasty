<mat-card class="gallery-card">
  <mat-card-header>
    <mat-card-title class="card-title">{{ recipeData()?.title }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <img
      mat-card-image
      class="recipe-image"
      [src]="recipeData()?.image"
      alt="{{ recipeData()?.title }}"
    />
    <mat-list class="recipe-info">
      <mat-list-item>
        <mat-icon>access_time</mat-icon>
        {{ recipeData()?.cookTime }}
      </mat-list-item>
      <mat-list-item>
        <mat-icon>local_fire_department</mat-icon>
        {{ recipeData()?.calories }}
      </mat-list-item>
    </mat-list>
  </mat-card-content>
</mat-card>
