<mat-card class="gallery-card">
  <img
    mat-card-image
    class="recipe-image"
    [src]="cardModel()?.getRecipeImage()"
    [alt]="cardModel()?.getRecipeTitle()"
  />

  <mat-card-content class="card-body">
    <h2 class="card-title">{{ cardModel()?.getTitleAndRecipe() }}</h2>

    <div class="recipe-info">
      <span class="info-item">
        <mat-icon>access_time</mat-icon>
        {{ cardModel()?.getCookTime() }}
      </span>
      <span class="info-item">
        <mat-icon>local_fire_department</mat-icon>
        {{ cardModel()?.getCalories() }}
      </span>
    </div>
  </mat-card-content>
</mat-card>
